{% extends 'Staff/department index.html' %}
{% block body %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
            <div class="card shadow border-0 rounded-3">

                <div class="card-header bg-dark text-white py-3">
                    <h4 class="mb-0 text-center fw-bold"><i class="fas fa-user-plus me-2"></i>Add Department Member</h4>
                </div>

                <div class="card-body p-4">
                    <form action="/myapp/add_soldier_post/" method="post" enctype="multipart/form-data" id="form1">
                        {% csrf_token %}

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="select" class="form-label fw-semibold">Designation</label>
                                <select class="form-select shadow-sm" name="select2" id="select" required>
                                    <option value="" selected disabled>Choose designation...</option>
                                    {% for i in data2 %}
                                    <option value="{{ i.id }}">{{ i.designation }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label for="textfield2" class="form-label fw-semibold">Full Name</label>
                                <input type="text" class="form-control shadow-sm" name="textfield" id="textfield2"
                                       placeholder="e.g. John Doe"
                                       pattern="[A-Za-z\s]{3,}"
                                       title="Name must contain only letters and be at least 3 characters long"
                                       required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Email Address</label>
                                <input class="form-control shadow-sm" type="email" name="Email"
                                       placeholder="name@example.com" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Phone Number</label>
                                <input class="form-control shadow-sm" type="tel" name="Phone"
                                       placeholder="10-digit number"
                                       pattern="[6-9][0-9]{9}"
                                       title="Please enter a valid 10-digit phone number starting with 6-9"
                                       required>
                            </div>

                            <div class="col-md-12 my-2">
                                <label class="form-label fw-semibold d-block">Gender</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="male" value="Male" checked>
                                    <label class="form-check-label" for="male">Male</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="female" value="Female">
                                    <label class="form-check-label" for="female">Female</label>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label for="fileField" class="form-label fw-semibold">Profile Photo</label>
                                <input class="form-control shadow-sm" type="file" name="Photo" id="fileField"
                                       accept="image/*" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Date of Birth</label>
                                <input class="form-control shadow-sm" type="date" name="Dob"
                                       max="2008-01-01" title="Member must be at least 18 years old" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Pincode</label>
                                <input class="form-control shadow-sm" type="text" name="Pincode"
                                       placeholder="6-digit code"
                                       pattern="[0-9]{6}"
                                       title="Pincode must be exactly 6 digits" required>
                            </div>

                            <div class="col-12"><hr class="my-3 text-muted"></div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-primary">Username</label>
                                <input class="form-control shadow-sm border-primary-subtle" type="text" name="Username"
                                       pattern="^[a-zA-Z0-9]+$"
                                       title="Username should be alphanumeric without spaces" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-primary">Password</label>
                                <input class="form-control shadow-sm border-primary-subtle" type="password" name="Password"
                                       pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                                       title="Must contain at least 8 characters, including one uppercase letter, one lowercase letter, and one number"
                                       required>
                            </div>
                        </div>

                        <div class="text-center mt-5">
                            <button type="submit" class="btn btn-primary btn-lg px-5 shadow">
                                <i class="fas fa-save me-2"></i>Register Member
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
