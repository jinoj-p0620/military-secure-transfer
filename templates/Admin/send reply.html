{% extends 'Admin/adminhome.html' %}
{% block body %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<div class="container mt-5">

    <div class="row mb-4">
        <div class="col-md-6 offset-md-3">
            <a href="javascript:history.back()" class="text-decoration-none text-muted small">
                <i class="bi bi-arrow-left me-1"></i> Back to Feedbacks
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

                <div class="card-header border-0 py-3 text-center bg-primary text-white"
                     style="background: linear-gradient(45deg, #0d6efd, #0b5ed7);">
                    <h5 class="mb-0 fw-bold">
                        <i class="bi bi-reply-all-fill me-2"></i> Compose Reply
                    </h5>
                </div>

                <div class="card-body p-4 p-md-5">
                    <form id="form1" name="form1" method="post" action="/myapp/send_reply_post/">
                        {% csrf_token %}

                        <div class="alert alert-info border-0 bg-light-subtle small mb-4">
                            <i class="bi bi-info-circle-fill me-2"></i>
                            Your response will be sent directly to the user's notification panel.
                        </div>

                        <div class="mb-4">
                            <label for="reply" class="form-label fw-bold text-secondary">Your Response</label>
                            <textarea
                                name="reply"
                                id="reply"
                                class="form-control form-control-lg border-2"
                                rows="6"
                                placeholder="Type your message here..."
                                style="resize: none; border-color: #f1f3f5; background-color: #f8f9fa;"
                                required></textarea>
                        </div>

                        <div class="row g-2">
                            <div class="col-sm-8">
                                <button type="submit" name="button" id="button" class="btn btn-primary btn-lg w-100 rounded-3 fw-bold shadow-sm">
                                    <i class="bi bi-send me-2"></i> Send Reply
                                </button>
                            </div>
                            <div class="col-sm-4">
                                <button type="reset" class="btn btn-outline-secondary btn-lg w-100 rounded-3">
                                    Clear
                                </button>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="card-footer bg-white border-0 text-center pb-4">
                    <p class="text-muted smaller mb-0">
                        <i class="bi bi-shield-check me-1"></i>
                        Formal response as Administrator
                    </p>
                </div>

            </div>
        </div>
    </div>
</div>

<style>
    /* Styling the textarea focus state */
    .form-control:focus {
        background-color: #fff !important;
        border-color: #0d6efd !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
    }

    .smaller {
        font-size: 0.8rem;
    }

    /* Subtle entry animation */
    .card {
        animation: slideInUp 0.4s ease-out;
    }

    @keyframes slideInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

{% endblock %}
