{% extends 'Admin/adminhome.html' %}
{% block body %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<div class="container mt-5">

    <div class="row mb-4">
        <div class="col-md-8 offset-md-2">
            <a href="javascript:history.back()" class="text-decoration-none text-muted small fw-bold text-uppercase tracking-widest">
                <i class="bi bi-arrow-left me-1"></i> Return to Hierarchy List
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">

            <div class="card border-0 shadow-sm rounded-0 industrial-card">

                <div class="card-header bg-white border-bottom-0 pt-4 px-4">
                    <div class="d-flex align-items-center mb-1">
                        <div class="bg-primary p-2 me-2"></div>
                        <h4 class="fw-black text-dark text-uppercase mb-0" style="letter-spacing: -1px;">
                            Define Rank
                        </h4>
                    </div>
                    <p class="text-muted smaller fw-bold text-uppercase mb-0 ps-4">New Designation Parameters</p>
                </div>

                <div class="card-body p-4 pt-3">
                    <form id="form1" name="form1" method="post" action="/myapp/add_designation_post/">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label for="textfield" class="form-label fw-bold text-secondary small text-uppercase tracking-wider">
                                Role / Designation Title
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-dark text-white border-0 rounded-0">
                                    <i class="bi bi-person-vcard-fill"></i>
                                </span>
                                <input type="text"
                                       name="name"
                                       id="textfield"
                                       class="form-control form-control-lg bg-light border-0 rounded-0 fs-6 focus-ring"
                                       placeholder="e.g. Squad Leader / Field Medic"
                                       required>
                            </div>
                            <div class="form-text mt-2 smaller italic">
                                <i class="bi bi-info-circle me-1"></i> This will be used to classify personnel in the global directory.
                            </div>
                        </div>

                        <div class="row g-2 pt-2">
                            <div class="col-8">
                                <button type="submit" class="btn btn-primary btn-lg w-100 rounded-0 fw-black text-uppercase letter-spacing-1 shadow-sm">
                                    <i class="bi bi-shield-plus me-2"></i> Register Rank
                                </button>
                            </div>
                            <div class="col-4">
                                <button type="reset" class="btn btn-outline-dark btn-lg w-100 rounded-0 fw-bold">
                                    CLEAR
                                </button>
                            </div>
                        </div>

                    </form>
                </div>

                <div class="card-footer bg-light bg-opacity-50 border-0 text-center py-3">
                    <span class="smaller text-muted fw-bold">
                        <i class="bi bi-cpu-fill me-1"></i> DIRECTORY NODE_ACCESS: LEVEL_2
                    </span>
                </div>
            </div>

        </div>
    </div>
</div>

<style>
    /* Technical Aesthetics */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

    body {
        background-color: #fcfcfc;
        font-family: 'Inter', sans-serif;
    }

    .fw-black { font-weight: 900; }
    .smaller { font-size: 0.7rem; }
    .tracking-widest { letter-spacing: 0.15em; }
    .letter-spacing-1 { letter-spacing: 1px; }

    .industrial-card {
        border-top: 4px solid #0d6efd !important;
        background: #ffffff;
        transition: transform 0.3s ease;
    }

    /* Input Focus Styling */
    .focus-ring:focus {
        background-color: #fff !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
        border: 1px solid #0d6efd !important;
    }

    .input-group-text {
        width: 50px;
        display: flex;
        justify-content: center;
    }

    /* Subtle Entry Animation */
    .industrial-card {
        animation: slideIn 0.4s ease-out forwards;
    }

    @keyframes slideIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

{% endblock %}
