{% extends 'Admin/adminhome.html' %}
{% block body %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<div class="container mt-5">

    <div class="row mb-4">
        <div class="col-md-8 offset-md-2">
            <a href="javascript:history.back()" class="text-decoration-none text-muted small fw-bold text-uppercase tracking-widest">
                <i class="bi bi-arrow-left me-1"></i> Return to Infrastructure
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">

            <div class="card border-0 shadow-sm rounded-0 industrial-card">

                <div class="card-header bg-white border-bottom-0 pt-4 px-4">
                    <h4 class="fw-black text-dark text-uppercase mb-1" style="letter-spacing: -1px;">
                        Register Unit
                    </h4>
                    <p class="text-muted smaller fw-bold text-uppercase mb-0">System Node Assignment</p>
                </div>

                <div class="card-body p-4 pt-2">
                    <form method="post" action="/myapp/add_dept_post/">
                        {% csrf_token %}

                        <div class="mb-4 mt-3">
                            <label class="form-label fw-bold text-secondary small text-uppercase tracking-wider">
                                New Department Designation
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-dark text-white border-0 rounded-0">
                                    <i class="bi bi-cpu"></i>
                                </span>
                                <input type="text"
                                       name="name"
                                       class="form-control form-control-lg bg-light border-0 rounded-0 fs-6 focus-ring"
                                       placeholder="e.g., Tactical Intel / Logistics"
                                       required>
                            </div>
                            <div class="form-text mt-2 smaller italic">
                                <i class="bi bi-info-square me-1"></i> Use clear, distinct nomenclature for personnel sorting.
                            </div>
                        </div>

                        <div class="row g-2">
                            <div class="col-8">
                                <button type="submit" class="btn btn-primary btn-lg w-100 rounded-0 fw-black text-uppercase letter-spacing-1 shadow-sm">
                                    <i class="bi bi-save2-fill me-2"></i> Initialize
                                </button>
                            </div>
                            <div class="col-4">
                                <button type="reset" class="btn btn-outline-dark btn-lg w-100 rounded-0 fw-bold px-0">
                                    RESET
                                </button>
                            </div>
                        </div>

                    </form>
                </div>

                <div class="card-footer bg-light bg-opacity-50 border-0 text-center py-3">
                    <span class="smaller text-muted fw-bold">
                        <i class="bi bi-shield-check me-1"></i> ENCRYPTED ADMIN COMMAND
                    </span>
                </div>
            </div>

        </div>
    </div>
</div>

<style>
    /* Styling for the Technical entry page */
    .fw-black { font-weight: 900; }
    .smaller { font-size: 0.7rem; }
    .tracking-widest { letter-spacing: 0.15em; }
    .letter-spacing-1 { letter-spacing: 1px; }

    .industrial-card {
        border-top: 5px solid #0d6efd !important;
        background: #ffffff;
    }

    /* Remove focus outlines and use custom rings */
    .focus-ring:focus {
        background-color: #fff !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        border: 1px solid #0d6efd !important;
    }

    .input-group-text {
        width: 45px;
        display: flex;
        justify-content: center;
    }

    /* Animation */
    .industrial-card {
        animation: formSlideUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }

    @keyframes formSlideUp {
        0% { transform: translateY(20px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
    }
</style>

{% endblock %}
