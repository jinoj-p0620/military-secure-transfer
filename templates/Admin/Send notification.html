{% extends 'Admin/adminhome.html' %}
{% block body %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<div class="container mt-5">

    <div class="row mb-4">
        <div class="col-md-8 offset-md-2">
            <a href="/myapp/view_notifications/" class="text-decoration-none text-muted small fw-bold text-uppercase">
                <i class="bi bi-arrow-left me-1"></i> Back to Notifications
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="card border-0 shadow-sm rounded-4">

                <div class="card-body p-5">

                    <div class="text-center mb-5">
                        <div class="d-inline-block bg-primary bg-opacity-10 p-3 rounded-circle mb-3">
                            <i class="bi bi-megaphone-fill text-primary fs-3"></i>
                        </div>
                        <h3 class="fw-bold text-dark">Broadcast Message</h3>
                        <p class="text-muted">This notification will be visible to all app users immediately.</p>
                    </div>

                    <form id="form1" name="form1" method="post" action="/myapp/send_notification_post/">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary small text-uppercase tracking-wider">
                                Notification Title
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-type-h1 text-muted"></i>
                                </span>
                                <input type="text"
                                       name="title"
                                       class="form-control form-control-lg border-start-0 ps-0 bg-light focus-ring"
                                       placeholder="e.g. System Maintenance"
                                       required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary small text-uppercase tracking-wider">
                                Detailed Message
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 align-items-start pt-3">
                                    <i class="bi bi-justify-left text-muted"></i>
                                </span>
                                <textarea name="description"
                                          class="form-control border-start-0 ps-0 bg-light focus-ring"
                                          rows="5"
                                          placeholder="Type your message here..."
                                          required></textarea>
                            </div>
                            <div class="form-text mt-2 italic">
                                <i class="bi bi-info-circle me-1"></i> Keep descriptions concise for better readability on mobile.
                            </div>
                        </div>

                        <div class="d-grid pt-2">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold py-3 shadow-sm rounded-3">
                                <i class="bi bi-send-check-fill me-2"></i> Dispatch Notification
                            </button>
                        </div>

                    </form>
                </div>
            </div>

            <div class="text-center mt-4">
                <p class="text-muted small">
                    <i class="bi bi-shield-lock-fill me-1"></i>
                    Authorized Admin Action Only
                </p>
            </div>

        </div>
    </div>
</div>

<style>
    /* Modern focus ring and input styling */
    .focus-ring:focus {
        background-color: #fff !important;
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
    }

    .input-group-text {
        border-color: #dee2e6;
    }

    .tracking-wider {
        letter-spacing: 0.05em;
    }

    /* Subtle entry animation */
    .card {
        animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

{% endblock %}
