{% extends 'Admin/adminhome.html' %}
{% block body %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<div class="container mt-5">

    <div class="row mb-4">
        <div class="col-md-8 offset-md-2">
            <a href="javascript:history.back()" class="text-decoration-none text-muted small fw-bold text-uppercase tracking-widest">
                <i class="bi bi-arrow-left me-1"></i> Abort Configuration
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">

            <div class="card border-0 shadow-sm rounded-0 industrial-card">

                <div class="card-header bg-white border-bottom-0 pt-4 px-4">
                    <div class="d-flex align-items-center justify-content-between mb-1">
                        <div class="d-flex align-items-center">
                            <div class="bg-warning p-2 me-2"></div>
                            <h4 class="fw-black text-dark text-uppercase mb-0" style="letter-spacing: -1px;">
                                Modify Rank
                            </h4>
                        </div>
                        <span class="badge bg-warning-subtle text-warning border border-warning-subtle rounded-0 smaller fw-bold">
                            EDIT_MODE
                        </span>
                    </div>
                    <p class="text-muted smaller fw-bold text-uppercase mb-0 ps-4">Updating Unique Identifier: #DES-{{ data.id }}</p>
                </div>

                <div class="card-body p-4 pt-3">
                    <form method="post" action="/myapp/edit_designation_post/">
                        {% csrf_token %}

                        <input type="hidden" name="id" value="{{ data.id }}">

                        <div class="mb-4">
                            <label for="textfield" class="form-label fw-bold text-secondary small text-uppercase tracking-wider">
                                Role / Designation Title
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-dark text-white border-0 rounded-0">
                                    <i class="bi bi-pencil-square"></i>
                                </span>
                                <input type="text"
                                       name="name"
                                       id="textfield"
                                       class="form-control form-control-lg bg-light border-0 rounded-0 fs-6 focus-ring"
                                       value="{{ data.designation }}"
                                       placeholder="Enter new designation name"
                                       required>
                            </div>
                            <div class="form-text mt-2 smaller italic">
                                <i class="bi bi-exclamation-triangle me-1 text-warning"></i>
                                Changing this will update all personnel currently assigned to this rank.
                            </div>
                        </div>

                        <div class="row g-2 pt-2">
                            <div class="col-8">
                                <button type="submit" class="btn btn-warning btn-lg w-100 rounded-0 fw-black text-uppercase letter-spacing-1 shadow-sm border-bottom border-dark border-3">
                                    <i class="bi bi-check-lg me-2"></i> Commit Changes
                                </button>
                            </div>
                            <div class="col-4">
                                <a href="javascript:history.back()" class="btn btn-outline-dark btn-lg w-100 rounded-0 fw-bold">
                                    CANCEL
                                </a>
                            </div>
                        </div>

                    </form>
                </div>

                <div class="card-footer bg-light bg-opacity-50 border-0 text-center py-3">
                    <span class="smaller text-muted fw-bold">
                        <i class="bi bi-shield-lock-fill me-1"></i> AUTHORIZED MODIFICATION LOGGED
                    </span>
                </div>
            </div>

        </div>
    </div>
</div>

<style>
    /* Technical Aesthetic Continuity */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

    body {
        background-color: #fcfcfc;
        font-family: 'Inter', sans-serif;
    }

    .fw-black { font-weight: 900; }
    .smaller { font-size: 0.7rem; }
    .tracking-widest { letter-spacing: 0.15em; }
    .letter-spacing-1 { letter-spacing: 1px; }

    .industrial-card {
        border-top: 5px solid #ffc107 !important; /* Warning yellow for Edit mode */
        background: #ffffff;
    }

    /* Input Focus Styling */
    .focus-ring:focus {
        background-color: #fff !important;
        box-shadow: 0 0 0 0.25rem rgba(255, 193, 7, 0.15);
        border: 1px solid #ffc107 !important;
    }

    .input-group-text {
        width: 50px;
        display: flex;
        justify-content: center;
    }

    .bg-warning-subtle {
        background-color: rgba(255, 193, 7, 0.1) !important;
    }

    /* Subtle Entry Animation */
    .industrial-card {
        animation: slideIn 0.3s ease-out forwards;
    }

    @keyframes slideIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

{% endblock %}
