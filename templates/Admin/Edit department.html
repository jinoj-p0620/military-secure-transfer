{% extends 'Admin/adminhome.html' %}
{% block body %}

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npmbootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<div class="container py-5">

    <!-- Page Heading -->
    <div class="row mb-4">
        <div class="col text-center">
            <h2 class="fw-bold text-uppercase text-primary">
                Department Details
            </h2>
            <hr class="w-25 mx-auto border-3 border-primary">
        </div>
    </div>

    <!-- Card -->
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-header text-white fw-semibold"
                     style="background: linear-gradient(135deg, #0d6efd, #6610f2);">
                    <i class="bi bi-pencil-square me-2"></i>
                    Edit Department
                </div>

                <div class="card-body p-4">

                    <form method="post" action="/myapp/edit_dept_post/">
                        {% csrf_token %}
                        <input type="hidden" name="id" value="{{ data.id }}">

                        <!-- Department Name -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-building me-1"></i>
                                Department Name
                            </label>
                            <input type="text"
                                   name="textfield"
                                   class="form-control shadow-sm"
                                   value="{{ data.department_name }}"
                                   required>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex justify-content-center gap-3">
                            <button type="submit" class="btn btn-success px-4">
                                <i class="bi bi-check-circle me-1"></i> Update
                            </button>
                            <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">
                                Cancel
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

{% endblock %}
